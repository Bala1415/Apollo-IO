version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: apollo-io/backend:latest
    container_name: apollo_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/apollo
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - apollo_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: apollo-io/worker:latest
    container_name: apollo_worker
    restart: always
    command: ["python", "-m", "backend.workers.worker"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/apollo
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    depends_on:
      - db
      - redis
    networks:
      - apollo_net

  db:
    image: postgres:15-alpine
    container_name: apollo_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: apollo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - apollo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apollo_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - apollo_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: apollo_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - apollo_net

  prometheus:
    image: prom/prometheus:latest
    container_name: apollo_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - apollo_net

networks:
  apollo_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data: